<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeaAnime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body>
  <div class="top-bar">
    <div class="container top-bar-inner">
      <a href="/" class="logo"><img src="images/favicon.png" alt="" class="logo-img"></a>
      <div class="search-row">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search anime..." autofocus>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="anime">Anime</button>
        <button class="mode-btn" data-mode="movie">Movie</button>
      </div>
    </div>
  </div>

  <div class="hero-slider" id="hero-slider">
    <div class="hero-slides" id="hero-slides"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="container hero-inner">
        <div class="hero-info" id="hero-info"></div>
        <div class="hero-dots" id="hero-dots"></div>
      </div>
    </div>
  </div>

  <div class="container main-content">
    <div class="section">
      <div class="section-header">
        <h2 class="section-title" id="trending-title">Trending Now</h2>
      </div>
      <div class="anime-grid" id="trending-grid"></div>
    </div>

    <div id="results-section"></div>
    <div id="detail-section" style="display:none"></div>
  </div>

  <img class="cover-popup" id="cover-popup" src="" alt="">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="script.js"></script>
</body>
</html>
