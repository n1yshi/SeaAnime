<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeaAnime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
  <div class="container">
    <div class="search-section">
      <a href="/" class="logo">SeaAnime</a>
      <div class="search-row">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search anime titles..." autofocus>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" data-mode="anime">Anime</button>
        <button class="mode-btn" data-mode="movie">Movie</button>
      </div>
    </div>

    <div class="content" id="results-section"></div>
    <div class="content" id="detail-section" style="display:none"></div>
  </div>

  <img class="cover-popup" id="cover-popup" src="" alt="">
  <script src="script.js"></script>
</body>
</html>
